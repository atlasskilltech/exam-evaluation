<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - AI Evaluation System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="dashboardApp()" x-init="init()">

  <!-- Mobile sidebar overlay -->
  <div x-show="sidebarOpen" x-cloak class="fixed inset-0 z-40 lg:hidden">
    <div class="absolute inset-0 bg-black/50" @click="sidebarOpen = false"></div>
  </div>

  <!-- Sidebar -->
  <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
         class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 transform transition-transform duration-200 lg:translate-x-0">
    <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-100">
      <div class="w-9 h-9 bg-indigo-700 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <span class="font-bold text-gray-900 text-lg">AI Eval</span>
      <button @click="sidebarOpen = false" class="ml-auto lg:hidden text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <nav class="px-3 py-4 space-y-1">
      <template x-for="item in navItems" :key="item.href">
        <a :href="item.href"
           :class="currentPage === item.id ? 'bg-indigo-50 text-indigo-700 font-semibold' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition">
          <span x-html="item.icon" class="w-5 h-5 flex-shrink-0"></span>
          <span x-text="item.label"></span>
        </a>
      </template>
    </nav>

    <!-- User info at bottom -->
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-100">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-semibold text-sm"
             x-text="userName.charAt(0).toUpperCase()"></div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-900 truncate" x-text="userName"></p>
          <p class="text-xs text-gray-500 capitalize" x-text="userRole"></p>
        </div>
        <button @click="logout()" class="text-gray-400 hover:text-red-600 transition" title="Logout">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <div class="lg:ml-64">
    <!-- Top bar -->
    <header class="sticky top-0 z-30 bg-white border-b border-gray-200 px-4 sm:px-6 py-4 flex items-center gap-4">
      <button @click="sidebarOpen = true" class="lg:hidden text-gray-500 hover:text-gray-700">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <h1 class="text-xl font-bold text-gray-900">Dashboard</h1>
    </header>

    <main class="p-4 sm:p-6">
      <!-- Loading state -->
      <div x-show="pageLoading" class="flex items-center justify-center py-20">
        <svg class="animate-spin w-8 h-8 text-indigo-700" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
        </svg>
      </div>

      <div x-show="!pageLoading" x-cloak>
        <!-- Stat Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-gray-500">Total Exams</p>
                <p class="text-2xl font-bold text-gray-900 mt-1" x-text="stats.totalExams">0</p>
              </div>
              <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
              </div>
            </div>
          </div>

          <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-gray-500">Batches Pending</p>
                <p class="text-2xl font-bold text-gray-900 mt-1" x-text="stats.batchesPending">0</p>
              </div>
              <div class="w-10 h-10 bg-amber-50 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
            </div>
          </div>

          <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-gray-500">Evaluated Today</p>
                <p class="text-2xl font-bold text-gray-900 mt-1" x-text="stats.evaluatedToday">0</p>
              </div>
              <div class="w-10 h-10 bg-green-50 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
            </div>
          </div>

          <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-gray-500">Approved</p>
                <p class="text-2xl font-bold text-gray-900 mt-1" x-text="stats.approved">0</p>
              </div>
              <div class="w-10 h-10 bg-indigo-50 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5 13l4 4L19 7"/>
                </svg>
              </div>
            </div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="flex flex-wrap gap-3 mb-6">
          <a href="/upload.html"
             class="inline-flex items-center gap-2 bg-indigo-700 hover:bg-indigo-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
            </svg>
            Upload New Batch
          </a>
          <a href="/exams.html"
             class="inline-flex items-center gap-2 bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 px-4 py-2 rounded-lg text-sm font-medium transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Create Exam
          </a>
          <a href="/results.html"
             class="inline-flex items-center gap-2 bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 px-4 py-2 rounded-lg text-sm font-medium transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            View Results
          </a>
        </div>

        <!-- Recent Batches Table -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100">
          <div class="px-5 py-4 border-b border-gray-100">
            <h2 class="text-base font-semibold text-gray-900">Recent Batches</h2>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="text-left text-gray-500 border-b border-gray-100">
                  <th class="px-5 py-3 font-medium">Batch Code</th>
                  <th class="px-5 py-3 font-medium">Student</th>
                  <th class="px-5 py-3 font-medium">Exam</th>
                  <th class="px-5 py-3 font-medium">Status</th>
                  <th class="px-5 py-3 font-medium">Actions</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-50">
                <template x-for="batch in recentBatches" :key="batch._id || batch.id">
                  <tr class="hover:bg-gray-50 transition">
                    <td class="px-5 py-3 font-mono text-xs" x-text="batch.batchCode"></td>
                    <td class="px-5 py-3" x-text="batch.student?.name || batch.studentName || '-'"></td>
                    <td class="px-5 py-3" x-text="batch.exam?.name || batch.examName || '-'"></td>
                    <td class="px-5 py-3">
                      <span :class="{
                        'bg-yellow-100 text-yellow-800': batch.status === 'pending' || batch.status === 'uploaded',
                        'bg-blue-100 text-blue-800': batch.status === 'processing' || batch.status === 'evaluating',
                        'bg-green-100 text-green-800': batch.status === 'evaluated' || batch.status === 'approved',
                        'bg-red-100 text-red-800': batch.status === 'failed' || batch.status === 'rejected',
                        'bg-gray-100 text-gray-800': !batch.status
                      }" class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium capitalize"
                         x-text="batch.status || 'unknown'"></span>
                    </td>
                    <td class="px-5 py-3">
                      <div class="flex items-center gap-2">
                        <a :href="'/review.html?batchId=' + (batch._id || batch.id)"
                           class="text-indigo-600 hover:text-indigo-800 text-xs font-medium">Review</a>
                        <a :href="'/results.html?batchId=' + (batch._id || batch.id)"
                           class="text-gray-500 hover:text-gray-700 text-xs font-medium">Results</a>
                      </div>
                    </td>
                  </tr>
                </template>
                <tr x-show="recentBatches.length === 0">
                  <td colspan="5" class="px-5 py-8 text-center text-gray-400">No recent batches found.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function dashboardApp() {
      return {
        sidebarOpen: false,
        currentPage: 'dashboard',
        userName: '',
        userRole: '',
        pageLoading: true,
        stats: { totalExams: 0, batchesPending: 0, evaluatedToday: 0, approved: 0 },
        recentBatches: [],

        navItems: [
          { id: 'dashboard', label: 'Dashboard', href: '/dashboard.html', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>' },
          { id: 'exams', label: 'Exams', href: '/exams.html', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>' },
          { id: 'upload', label: 'Upload', href: '/upload.html', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>' },
          { id: 'review', label: 'Review', href: '/review.html', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>' },
          { id: 'results', label: 'Results', href: '/results.html', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>' },
          { id: 'analytics', label: 'Analytics', href: '/analytics.html', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>' },
          { id: 'import', label: 'Import', href: '/import.html', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4 4l-4 4m0 0l-4-4m4 4V4"/></svg>' },
        ],

        authHeaders() {
          return {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + localStorage.getItem('auth_token')
          };
        },

        async init() {
          const token = localStorage.getItem('auth_token');
          if (!token) { window.location.href = '/login.html'; return; }

          try {
            const res = await fetch('/api/auth/me', { headers: this.authHeaders() });
            if (!res.ok) { this.logout(); return; }
            const data = await res.json();
            const user = data.user || data;
            this.userName = user.name || user.email || '';
            this.userRole = user.role || '';
            localStorage.setItem('user_role', this.userRole);
            localStorage.setItem('user_name', this.userName);

            if (this.userRole === 'student') { window.location.href = '/exam-results.html'; return; }
            if (this.userRole === 'principal') { window.location.href = '/analytics.html'; return; }

            await this.loadDashboardData();
          } catch (err) {
            console.error('Failed to load user:', err);
          } finally {
            this.pageLoading = false;
          }
        },

        async loadDashboardData() {
          try {
            const [examsRes, batchesRes] = await Promise.all([
              fetch('/api/exams', { headers: this.authHeaders() }),
              fetch('/api/upload/batches', { headers: this.authHeaders() })
            ]);

            if (examsRes.ok) {
              const examsData = await examsRes.json();
              const exams = examsData.exams || examsData.data || examsData || [];
              this.stats.totalExams = Array.isArray(exams) ? exams.length : (examsData.total || 0);
            }

            if (batchesRes.ok) {
              const batchesData = await batchesRes.json();
              const batches = batchesData.batches || batchesData.data || batchesData || [];
              const batchList = Array.isArray(batches) ? batches : [];

              this.stats.batchesPending = batchList.filter(b => b.status === 'pending' || b.status === 'uploaded').length;
              this.stats.approved = batchList.filter(b => b.status === 'approved').length;

              const today = new Date().toISOString().split('T')[0];
              this.stats.evaluatedToday = batchList.filter(b =>
                (b.status === 'evaluated' || b.status === 'approved') &&
                b.updatedAt && b.updatedAt.startsWith(today)
              ).length;

              this.recentBatches = batchList.slice(0, 10);
            }
          } catch (err) {
            console.error('Failed to load dashboard data:', err);
          }
        },

        logout() {
          localStorage.removeItem('auth_token');
          localStorage.removeItem('user_role');
          localStorage.removeItem('user_name');
          window.location.href = '/login.html';
        }
      };
    }
  </script>
</body>
</html>
