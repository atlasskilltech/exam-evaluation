<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AI Evaluation System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-900 via-indigo-800 to-purple-900 flex items-center justify-center p-4"
      x-data="loginApp()" x-init="init()">

  <div class="w-full max-w-md">
    <!-- Login Card -->
    <div class="bg-white rounded-xl shadow-sm p-8">
      <!-- Logo / Institution Name -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 rounded-full mb-4">
          <svg class="w-8 h-8 text-indigo-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">AI Evaluation System</h1>
        <p class="text-gray-500 mt-1 text-sm">Sign in to your account</p>
      </div>

      <!-- Error Message -->
      <div x-show="errorMessage" x-cloak
           class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm flex items-center gap-2">
        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd"
                d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                clip-rule="evenodd"/>
        </svg>
        <span x-text="errorMessage"></span>
      </div>

      <!-- Success Message -->
      <div x-show="successMessage" x-cloak
           class="mb-4 p-3 bg-green-50 border border-green-200 text-green-700 rounded-lg text-sm flex items-center gap-2">
        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd"
                d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                clip-rule="evenodd"/>
        </svg>
        <span x-text="successMessage"></span>
      </div>

      <!-- Login Form -->
      <form @submit.prevent="handleLogin" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input type="email" id="email" x-model="email" required
                 class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm"
                 placeholder="you@example.com">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <input :type="showPassword ? 'text' : 'password'" id="password" x-model="password" required
                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm pr-10"
                   placeholder="Enter your password">
            <button type="button" @click="showPassword = !showPassword"
                    class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600">
              <svg x-show="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg x-show="showPassword" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" :disabled="loading"
                class="w-full bg-indigo-700 hover:bg-indigo-800 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
          <svg x-show="loading" class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
          </svg>
          <span x-text="loading ? 'Signing in...' : 'Sign In'"></span>
        </button>
      </form>

      <div class="mt-4 text-center space-y-2">
        <button @click="showForgotModal = true" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium">
          Forgot Password?
        </button>
        <div>
          <a href="/faculty-login.html" class="text-sm text-teal-600 hover:text-teal-800 font-medium">
            Faculty Login Portal
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Forgot Password OTP Modal -->
  <div x-show="showForgotModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4"
       @keydown.escape.window="showForgotModal = false">
    <div class="absolute inset-0 bg-black/50" @click="showForgotModal = false"></div>
    <div class="relative bg-white rounded-xl shadow-lg w-full max-w-md p-6 z-10" @click.stop>
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-semibold text-gray-900">Reset Password</h2>
        <button @click="closeForgotModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div x-show="otpError" x-cloak
           class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
        <span x-text="otpError"></span>
      </div>

      <!-- Step 1: Email -->
      <div x-show="otpStep === 1">
        <p class="text-sm text-gray-600 mb-4">Enter your registered email to receive a one-time password.</p>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input type="email" x-model="otpEmail"
                 class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm"
                 placeholder="you@example.com">
        </div>
        <button @click="sendOtp()" :disabled="otpLoading"
                class="w-full bg-indigo-700 hover:bg-indigo-800 text-white font-medium py-2.5 px-4 rounded-lg transition disabled:opacity-60">
          <span x-text="otpLoading ? 'Sending...' : 'Send OTP'"></span>
        </button>
      </div>

      <!-- Step 2: OTP Verification -->
      <div x-show="otpStep === 2">
        <p class="text-sm text-gray-600 mb-4">Enter the OTP sent to <span class="font-medium" x-text="otpEmail"></span>.</p>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">OTP Code</label>
          <input type="text" x-model="otpCode" maxlength="6"
                 class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm tracking-widest text-center text-lg"
                 placeholder="000000">
        </div>
        <button @click="verifyOtp()" :disabled="otpLoading"
                class="w-full bg-indigo-700 hover:bg-indigo-800 text-white font-medium py-2.5 px-4 rounded-lg transition disabled:opacity-60">
          <span x-text="otpLoading ? 'Verifying...' : 'Verify OTP'"></span>
        </button>
      </div>

      <!-- Step 3: New Password -->
      <div x-show="otpStep === 3">
        <p class="text-sm text-gray-600 mb-4">Set your new password.</p>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
          <input type="password" x-model="newPassword"
                 class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm"
                 placeholder="Enter new password">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input type="password" x-model="confirmPassword"
                 class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm"
                 placeholder="Confirm new password">
        </div>
        <button @click="resetPassword()" :disabled="otpLoading"
                class="w-full bg-indigo-700 hover:bg-indigo-800 text-white font-medium py-2.5 px-4 rounded-lg transition disabled:opacity-60">
          <span x-text="otpLoading ? 'Resetting...' : 'Reset Password'"></span>
        </button>
      </div>
    </div>
  </div>

  <script>
    function loginApp() {
      return {
        email: '',
        password: '',
        showPassword: false,
        loading: false,
        errorMessage: '',
        successMessage: '',
        showForgotModal: false,
        otpStep: 1,
        otpEmail: '',
        otpCode: '',
        newPassword: '',
        confirmPassword: '',
        otpLoading: false,
        otpError: '',
        resetToken: '',

        init() {
          const token = localStorage.getItem('auth_token');
          if (token) this.redirectByRole();
        },

        async handleLogin() {
          this.errorMessage = '';
          this.successMessage = '';
          this.loading = true;
          try {
            const res = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: this.email, password: this.password })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Invalid email or password');
            localStorage.setItem('auth_token', data.token);
            localStorage.setItem('user_role', data.user?.role || data.role || '');
            localStorage.setItem('user_name', data.user?.name || data.name || '');
            this.redirectByRole();
          } catch (err) {
            this.errorMessage = err.message;
          } finally {
            this.loading = false;
          }
        },

        redirectByRole() {
          const role = localStorage.getItem('user_role');
          if (role === 'student') window.location.href = '/exam-results.html';
          else if (role === 'principal') window.location.href = '/analytics.html';
          else window.location.href = '/dashboard.html';
        },

        closeForgotModal() {
          this.showForgotModal = false;
          this.otpStep = 1;
          this.otpEmail = '';
          this.otpCode = '';
          this.newPassword = '';
          this.confirmPassword = '';
          this.otpError = '';
          this.resetToken = '';
        },

        async sendOtp() {
          this.otpError = '';
          if (!this.otpEmail) { this.otpError = 'Please enter your email'; return; }
          this.otpLoading = true;
          try {
            const res = await fetch('/api/auth/forgot-password', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: this.otpEmail })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Failed to send OTP');
            this.otpStep = 2;
          } catch (err) {
            this.otpError = err.message;
          } finally {
            this.otpLoading = false;
          }
        },

        async verifyOtp() {
          this.otpError = '';
          if (!this.otpCode) { this.otpError = 'Please enter the OTP'; return; }
          this.otpLoading = true;
          try {
            const res = await fetch('/api/auth/verify-otp', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: this.otpEmail, otp: this.otpCode })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Invalid OTP');
            this.resetToken = data.resetToken || '';
            this.otpStep = 3;
          } catch (err) {
            this.otpError = err.message;
          } finally {
            this.otpLoading = false;
          }
        },

        async resetPassword() {
          this.otpError = '';
          if (this.newPassword !== this.confirmPassword) { this.otpError = 'Passwords do not match'; return; }
          if (this.newPassword.length < 6) { this.otpError = 'Password must be at least 6 characters'; return; }
          this.otpLoading = true;
          try {
            const res = await fetch('/api/auth/reset-password', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: this.otpEmail, otp: this.otpCode, resetToken: this.resetToken, newPassword: this.newPassword })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Failed to reset password');
            this.closeForgotModal();
            this.successMessage = 'Password reset successful. Please sign in.';
          } catch (err) {
            this.otpError = err.message;
          } finally {
            this.otpLoading = false;
          }
        }
      };
    }
  </script>
</body>
</html>
