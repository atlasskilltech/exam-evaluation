<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Evaluation System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="text-center">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 rounded-full mb-4">
      <svg class="w-8 h-8 text-indigo-700 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
      </svg>
    </div>
    <p class="text-gray-500 text-sm">Redirecting...</p>
  </div>

  <script>
    (async function() {
      const token = localStorage.getItem('auth_token');

      if (!token) {
        window.location.href = '/login.html';
        return;
      }

      try {
        const res = await fetch('/api/auth/me', {
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          }
        });

        if (!res.ok) {
          localStorage.removeItem('auth_token');
          localStorage.removeItem('user_role');
          localStorage.removeItem('user_name');
          window.location.href = '/login.html';
          return;
        }

        const data = await res.json();
        const user = data.user || data;
        const role = user.role || '';

        localStorage.setItem('user_role', role);
        localStorage.setItem('user_name', user.name || user.email || '');

        switch (role) {
          case 'student':
            window.location.href = '/exam-results.html';
            break;
          case 'principal':
            window.location.href = '/analytics.html';
            break;
          case 'superadmin':
          case 'admin':
          case 'teacher':
          default:
            window.location.href = '/dashboard.html';
            break;
        }
      } catch (err) {
        console.error('Auth check failed:', err);
        localStorage.removeItem('auth_token');
        localStorage.removeItem('user_role');
        localStorage.removeItem('user_name');
        window.location.href = '/login.html';
      }
    })();
  </script>
</body>
</html>
