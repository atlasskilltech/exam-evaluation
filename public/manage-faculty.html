<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Faculty - AI Evaluation System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="manageFaculty()" x-init="init()">

  <!-- Sidebar -->
  <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
         class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 transform transition-transform duration-200 lg:translate-x-0">
    <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-100">
      <div class="w-9 h-9 bg-indigo-700 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <span class="font-bold text-gray-900 text-lg">AI Eval</span>
    </div>
    <nav class="px-3 py-4 space-y-1">
      <a href="/dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-50">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
        Dashboard
      </a>
      <a href="/exams.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-50">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Exams
      </a>
      <a href="/manage-faculty.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm bg-indigo-50 text-indigo-700 font-semibold">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Faculty
      </a>
      <a href="/question-config.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-50">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Question Config
      </a>
      <a href="/upload-student-papers.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-50">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        Upload Papers
      </a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-100">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-semibold text-sm"
             x-text="(localStorage.getItem('user_name')||'A').charAt(0).toUpperCase()"></div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-900 truncate" x-text="localStorage.getItem('user_name')"></p>
          <p class="text-xs text-gray-500 capitalize" x-text="localStorage.getItem('user_role')"></p>
        </div>
        <button @click="localStorage.removeItem('auth_token');localStorage.removeItem('user_role');localStorage.removeItem('user_name');window.location.href='/login.html'"
                class="text-gray-400 hover:text-red-600 transition" title="Logout">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <div class="lg:ml-64">
    <header class="sticky top-0 z-30 bg-white border-b border-gray-200 px-4 sm:px-6 py-4 flex items-center gap-4">
      <button @click="sidebarOpen = true" class="lg:hidden text-gray-500 hover:text-gray-700">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <h1 class="text-xl font-bold text-gray-900">Manage Faculty</h1>
    </header>

    <main class="p-4 sm:p-6">
      <!-- Success/Error messages -->
      <div x-show="successMsg" x-cloak class="mb-4 p-3 bg-green-50 border border-green-200 text-green-700 rounded-lg text-sm" x-text="successMsg"></div>
      <div x-show="errorMsg" x-cloak class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm" x-text="errorMsg"></div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Add Faculty -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
          <h2 class="text-base font-semibold text-gray-900 mb-4">Add New Faculty</h2>
          <form @submit.prevent="createFaculty()" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
              <input type="text" x-model="newFaculty.name" required
                     class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Faculty name">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
              <input type="email" x-model="newFaculty.email" required
                     class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="faculty@example.com">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
              <input type="password" x-model="newFaculty.password" required
                     class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Initial password">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
              <input type="text" x-model="newFaculty.phone"
                     class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Phone number">
            </div>
            <button type="submit" :disabled="creating"
                    class="w-full bg-indigo-700 hover:bg-indigo-800 text-white font-medium py-2 px-4 rounded-lg text-sm transition disabled:opacity-60">
              <span x-text="creating ? 'Creating...' : 'Create Faculty'"></span>
            </button>
          </form>
        </div>

        <!-- Map Faculty to Subject -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
          <h2 class="text-base font-semibold text-gray-900 mb-4">Assign Faculty to Subject</h2>
          <form @submit.prevent="mapFaculty()" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Select Faculty</label>
              <select x-model="mapping.facultyId" required
                      class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                <option value="">-- Select Faculty --</option>
                <template x-for="f in facultyList" :key="f._id">
                  <option :value="f._id" x-text="f.name + ' (' + f.email + ')'"></option>
                </template>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Select Exam</label>
              <select x-model="mapping.examId" @change="loadSubjects()" required
                      class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                <option value="">-- Select Exam --</option>
                <template x-for="e in exams" :key="e._id">
                  <option :value="e._id" x-text="e.name"></option>
                </template>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Select Subject</label>
              <select x-model="mapping.subjectId" required
                      class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                <option value="">-- Select Subject --</option>
                <template x-for="s in subjects" :key="s._id">
                  <option :value="s._id" x-text="s.name + (s.code ? ' (' + s.code + ')' : '')"></option>
                </template>
              </select>
            </div>
            <button type="submit" :disabled="assigning"
                    class="w-full bg-teal-700 hover:bg-teal-800 text-white font-medium py-2 px-4 rounded-lg text-sm transition disabled:opacity-60">
              <span x-text="assigning ? 'Assigning...' : 'Assign Faculty'"></span>
            </button>
          </form>
        </div>
      </div>

      <!-- Faculty List -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 mt-6">
        <div class="px-5 py-4 border-b border-gray-100">
          <h2 class="text-base font-semibold text-gray-900">Registered Faculty</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-gray-500 border-b border-gray-100">
                <th class="px-5 py-3 font-medium">Name</th>
                <th class="px-5 py-3 font-medium">Email</th>
                <th class="px-5 py-3 font-medium">Phone</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
              <template x-for="f in facultyList" :key="f._id">
                <tr class="hover:bg-gray-50">
                  <td class="px-5 py-3 font-medium" x-text="f.name"></td>
                  <td class="px-5 py-3" x-text="f.email"></td>
                  <td class="px-5 py-3" x-text="f.phone || '-'"></td>
                </tr>
              </template>
              <tr x-show="facultyList.length === 0">
                <td colspan="3" class="px-5 py-8 text-center text-gray-400">No faculty registered yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Mappings -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 mt-6">
        <div class="px-5 py-4 border-b border-gray-100">
          <h2 class="text-base font-semibold text-gray-900">Faculty-Subject Mappings</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-gray-500 border-b border-gray-100">
                <th class="px-5 py-3 font-medium">Faculty</th>
                <th class="px-5 py-3 font-medium">Exam</th>
                <th class="px-5 py-3 font-medium">Subject</th>
                <th class="px-5 py-3 font-medium">Actions</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
              <template x-for="m in mappingsList" :key="m._id">
                <tr class="hover:bg-gray-50">
                  <td class="px-5 py-3 font-medium" x-text="m.facultyId?.name || '-'"></td>
                  <td class="px-5 py-3" x-text="m.examId?.name || '-'"></td>
                  <td class="px-5 py-3" x-text="m.subjectId?.name || '-'"></td>
                  <td class="px-5 py-3">
                    <button @click="removeMapping(m._id)" class="text-red-600 hover:text-red-800 text-xs font-medium">Remove</button>
                  </td>
                </tr>
              </template>
              <tr x-show="mappingsList.length === 0">
                <td colspan="4" class="px-5 py-8 text-center text-gray-400">No mappings yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    function manageFaculty() {
      return {
        sidebarOpen: false, successMsg: '', errorMsg: '',
        creating: false, assigning: false,
        newFaculty: { name: '', email: '', password: '', phone: '' },
        mapping: { facultyId: '', examId: '', subjectId: '' },
        facultyList: [], exams: [], subjects: [], mappingsList: [],

        authHeaders() {
          return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('auth_token') };
        },

        async init() {
          if (!localStorage.getItem('auth_token')) { window.location.href = '/login.html'; return; }
          await Promise.all([this.loadFaculty(), this.loadExams(), this.loadMappings()]);
        },

        async loadFaculty() {
          try {
            const res = await fetch('/api/faculty/list', { headers: this.authHeaders() });
            if (res.ok) { const d = await res.json(); this.facultyList = d.faculty || []; }
          } catch (e) { console.error(e); }
        },

        async loadExams() {
          try {
            const res = await fetch('/api/exams', { headers: this.authHeaders() });
            if (res.ok) { const d = await res.json(); this.exams = d.exams || []; }
          } catch (e) { console.error(e); }
        },

        async loadSubjects() {
          this.subjects = [];
          if (!this.mapping.examId) return;
          try {
            const res = await fetch('/api/exams/' + this.mapping.examId + '/subjects', { headers: this.authHeaders() });
            if (res.ok) { const d = await res.json(); this.subjects = d.subjects || []; }
          } catch (e) { console.error(e); }
        },

        async loadMappings() {
          try {
            const res = await fetch('/api/faculty/mappings', { headers: this.authHeaders() });
            if (res.ok) { const d = await res.json(); this.mappingsList = d.mappings || []; }
          } catch (e) { console.error(e); }
        },

        async createFaculty() {
          this.successMsg = ''; this.errorMsg = ''; this.creating = true;
          try {
            const res = await fetch('/api/faculty/create', {
              method: 'POST', headers: this.authHeaders(),
              body: JSON.stringify(this.newFaculty)
            });
            const d = await res.json();
            if (!res.ok) throw new Error(d.message);
            this.successMsg = 'Faculty created successfully';
            this.newFaculty = { name: '', email: '', password: '', phone: '' };
            await this.loadFaculty();
          } catch (e) { this.errorMsg = e.message; }
          finally { this.creating = false; }
        },

        async mapFaculty() {
          this.successMsg = ''; this.errorMsg = ''; this.assigning = true;
          try {
            const res = await fetch('/api/faculty/mapping', {
              method: 'POST', headers: this.authHeaders(),
              body: JSON.stringify(this.mapping)
            });
            const d = await res.json();
            if (!res.ok) throw new Error(d.message);
            this.successMsg = 'Faculty assigned to subject successfully';
            this.mapping = { facultyId: '', examId: '', subjectId: '' };
            await this.loadMappings();
          } catch (e) { this.errorMsg = e.message; }
          finally { this.assigning = false; }
        },

        async removeMapping(id) {
          if (!confirm('Remove this mapping?')) return;
          try {
            const res = await fetch('/api/faculty/mapping/' + id, { method: 'DELETE', headers: this.authHeaders() });
            if (res.ok) { this.successMsg = 'Mapping removed'; await this.loadMappings(); }
          } catch (e) { this.errorMsg = e.message; }
        }
      };
    }
  </script>
</body>
</html>
