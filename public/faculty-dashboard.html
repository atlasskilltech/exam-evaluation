<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Dashboard - AI Evaluation System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="facultyDashboard()" x-init="init()">

  <!-- Sidebar -->
  <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
         class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 transform transition-transform duration-200 lg:translate-x-0">
    <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-100">
      <div class="w-9 h-9 bg-teal-700 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <span class="font-bold text-gray-900 text-lg">Faculty Portal</span>
      <button @click="sidebarOpen = false" class="ml-auto lg:hidden text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <nav class="px-3 py-4 space-y-1">
      <a href="/faculty-dashboard.html"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm bg-teal-50 text-teal-700 font-semibold">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
        Dashboard
      </a>
    </nav>

    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-100">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-teal-100 rounded-full flex items-center justify-center text-teal-700 font-semibold text-sm"
             x-text="userName.charAt(0).toUpperCase()"></div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-900 truncate" x-text="userName"></p>
          <p class="text-xs text-gray-500">Faculty</p>
        </div>
        <button @click="logout()" class="text-gray-400 hover:text-red-600 transition" title="Logout">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="lg:ml-64">
    <header class="sticky top-0 z-30 bg-white border-b border-gray-200 px-4 sm:px-6 py-4 flex items-center gap-4">
      <button @click="sidebarOpen = true" class="lg:hidden text-gray-500 hover:text-gray-700">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <h1 class="text-xl font-bold text-gray-900">Faculty Dashboard</h1>
    </header>

    <main class="p-4 sm:p-6">
      <div x-show="pageLoading" class="flex items-center justify-center py-20">
        <svg class="animate-spin w-8 h-8 text-teal-700" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
        </svg>
      </div>

      <div x-show="!pageLoading" x-cloak>
        <!-- Stats -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-gray-500">Total Assigned</p>
                <p class="text-2xl font-bold text-gray-900 mt-1" x-text="stats.totalAssigned">0</p>
              </div>
              <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              </div>
            </div>
          </div>
          <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-gray-500">Pending</p>
                <p class="text-2xl font-bold text-amber-600 mt-1" x-text="stats.pending">0</p>
              </div>
              <div class="w-10 h-10 bg-amber-50 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              </div>
            </div>
          </div>
          <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-gray-500">Evaluated</p>
                <p class="text-2xl font-bold text-green-600 mt-1" x-text="stats.evaluated">0</p>
              </div>
              <div class="w-10 h-10 bg-green-50 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              </div>
            </div>
          </div>
          <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-gray-500">Approved</p>
                <p class="text-2xl font-bold text-indigo-600 mt-1" x-text="stats.approved">0</p>
              </div>
              <div class="w-10 h-10 bg-indigo-50 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              </div>
            </div>
          </div>
        </div>

        <!-- Assigned Subjects -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 mb-6" x-show="mappings.length > 0">
          <div class="px-5 py-4 border-b border-gray-100">
            <h2 class="text-base font-semibold text-gray-900">My Assigned Subjects</h2>
          </div>
          <div class="p-5 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <template x-for="m in mappings" :key="m._id">
              <div class="border border-gray-200 rounded-lg p-4 hover:border-teal-300 transition">
                <h3 class="font-semibold text-gray-900" x-text="m.subjectId?.name || 'Subject'"></h3>
                <p class="text-sm text-gray-500 mt-1" x-text="m.examId?.name || 'Exam'"></p>
                <p class="text-xs text-gray-400 mt-1" x-text="'Code: ' + (m.subjectId?.code || '-')"></p>
              </div>
            </template>
          </div>
        </div>

        <!-- Assigned Papers -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100">
          <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
            <h2 class="text-base font-semibold text-gray-900">Assigned Answer Sheets</h2>
            <select x-model="filterStatus" @change="loadPapers()"
                    class="text-sm border border-gray-300 rounded-lg px-3 py-1.5 focus:ring-2 focus:ring-teal-500 outline-none">
              <option value="">All Status</option>
              <option value="assigned">Pending</option>
              <option value="evaluating">In Progress</option>
              <option value="evaluated">Evaluated</option>
              <option value="approved">Approved</option>
            </select>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="text-left text-gray-500 border-b border-gray-100">
                  <th class="px-5 py-3 font-medium">#</th>
                  <th class="px-5 py-3 font-medium">Student</th>
                  <th class="px-5 py-3 font-medium">Roll No</th>
                  <th class="px-5 py-3 font-medium">Subject</th>
                  <th class="px-5 py-3 font-medium">Exam</th>
                  <th class="px-5 py-3 font-medium">Status</th>
                  <th class="px-5 py-3 font-medium">Score</th>
                  <th class="px-5 py-3 font-medium">Actions</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-50">
                <template x-for="(paper, idx) in papers" :key="paper._id">
                  <tr class="hover:bg-gray-50 transition">
                    <td class="px-5 py-3 text-gray-400" x-text="idx + 1"></td>
                    <td class="px-5 py-3 font-medium" x-text="paper.studentName || '-'"></td>
                    <td class="px-5 py-3" x-text="paper.rollNo || '-'"></td>
                    <td class="px-5 py-3" x-text="paper.subjectId?.name || '-'"></td>
                    <td class="px-5 py-3" x-text="paper.examId?.name || '-'"></td>
                    <td class="px-5 py-3">
                      <span :class="{
                        'bg-yellow-100 text-yellow-800': paper.status === 'assigned',
                        'bg-blue-100 text-blue-800': paper.status === 'evaluating',
                        'bg-green-100 text-green-800': paper.status === 'evaluated',
                        'bg-indigo-100 text-indigo-800': paper.status === 'approved'
                      }" class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium capitalize"
                         x-text="paper.status"></span>
                    </td>
                    <td class="px-5 py-3">
                      <span x-show="paper.evaluation" x-text="paper.evaluation?.totalMarks + '/' + paper.evaluation?.maxTotalMarks" class="font-medium"></span>
                      <span x-show="!paper.evaluation" class="text-gray-400">-</span>
                    </td>
                    <td class="px-5 py-3">
                      <a :href="'/faculty-evaluate.html?paperId=' + paper._id"
                         class="inline-flex items-center gap-1 text-teal-600 hover:text-teal-800 text-xs font-medium">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                        <span x-text="paper.status === 'evaluated' || paper.status === 'approved' ? 'View' : 'Evaluate'"></span>
                      </a>
                    </td>
                  </tr>
                </template>
                <tr x-show="papers.length === 0">
                  <td colspan="8" class="px-5 py-8 text-center text-gray-400">No answer sheets assigned yet.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function facultyDashboard() {
      return {
        sidebarOpen: false, userName: '', pageLoading: true, filterStatus: '',
        stats: { totalAssigned: 0, pending: 0, evaluated: 0, approved: 0 },
        mappings: [], papers: [],

        authHeaders() {
          return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('auth_token') };
        },

        async init() {
          const token = localStorage.getItem('auth_token');
          if (!token) { window.location.href = '/faculty-login.html'; return; }
          this.userName = localStorage.getItem('user_name') || '';

          try {
            const res = await fetch('/api/auth/me', { headers: this.authHeaders() });
            if (!res.ok) { this.logout(); return; }
            const data = await res.json();
            if (data.user.role !== 'faculty') { window.location.href = '/login.html'; return; }

            await Promise.all([this.loadDashboard(), this.loadPapers()]);
          } catch (err) { console.error(err); }
          finally { this.pageLoading = false; }
        },

        async loadDashboard() {
          try {
            const res = await fetch('/api/faculty/dashboard', { headers: this.authHeaders() });
            if (res.ok) {
              const data = await res.json();
              this.stats = data.stats;
              this.mappings = data.mappings || [];
            }
          } catch (err) { console.error(err); }
        },

        async loadPapers() {
          try {
            let url = '/api/faculty/my-papers';
            if (this.filterStatus) url += '?status=' + this.filterStatus;
            const res = await fetch(url, { headers: this.authHeaders() });
            if (res.ok) {
              const data = await res.json();
              this.papers = data.papers || [];
            }
          } catch (err) { console.error(err); }
        },

        logout() {
          localStorage.removeItem('auth_token');
          localStorage.removeItem('user_role');
          localStorage.removeItem('user_name');
          window.location.href = '/faculty-login.html';
        }
      };
    }
  </script>
</body>
</html>
